<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - STYLELESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='final_project/image5.png') }}">
    <style>
        :root {
            --brand-dark: #111111;
            --brand-gray: #717171;
            --brand-light: #F5F5F5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--brand-light);
            font-family: var(--font-main);
            color: var(--brand-dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: #ffffff;
            border-radius: 32px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        .brand-logo {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--brand-dark);
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1.5px;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-gray);
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 1rem;
            background-color: #fafafa;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--brand-dark);
            background-color: #fff;
            box-shadow: none;
        }

        .btn-register {
            background: var(--brand-dark);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 16px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: var(--transition);
        }

        .btn-register:hover {
            background: #333;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .alternate-link {
            text-align: center;
            margin-top: 30px;
            color: var(--brand-gray);
            font-size: 0.95rem;
        }

        .alternate-link a {
            color: var(--brand-dark);
            text-decoration: none;
            font-weight: 700;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--brand-dark);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert {
            border-radius: 16px;
            padding: 15px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>
    <a href="{{ url_for('home') }}" class="back-link"><i class="fa fa-arrow-left"></i> Back to Store</a>

    <div class="register-card">
        <a href="{{ url_for('home') }}" class="brand-logo">STYLELESS</a>
        
        <h2 class="fw-bold mb-4 text-center" style="font-family: var(--font-heading);">Join the Movement</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('do_register') }}" method="POST">
            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" name="first_name" placeholder="John" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" name="last_name" placeholder="Doe" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" name="email" placeholder="john@example.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" name="phone" placeholder="012 345 678" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" placeholder="••••••••" required>
                </div>
            </div>
            
            <button type="submit" class="btn-register">Create Account</button>
        </form>
        <div class="alternate-link">
            Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
