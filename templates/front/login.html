<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - STYLELESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='final_project/image5.png') }}">
    <style>
        :root {
            --brand-dark: #111111;
            --brand-gray: #717171;
            --brand-light: #f5f5f5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--brand-light);
            font-family: var(--font-main);
            color: var(--brand-dark);
        }

        .auth-wrap {
            width: 100%;
            max-width: 440px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            color: var(--brand-dark);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 36px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
        }

        .brand-logo {
            display: inline-block;
            margin-bottom: 18px;
            text-decoration: none;
            color: var(--brand-dark);
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
        }

        .auth-title {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-copy {
            color: var(--brand-gray);
            margin-bottom: 24px;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-gray);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 14px;
            border: 1px solid #dddddd;
            padding: 14px 16px;
            min-height: 52px;
            box-shadow: none;
        }

        .form-control:focus {
            border-color: var(--brand-dark);
            box-shadow: 0 0 0 3px rgba(17, 17, 17, 0.06);
        }

        .form-check-label {
            color: var(--brand-gray);
            font-size: 0.92rem;
        }

        .btn-login {
            width: 100%;
            border: none;
            border-radius: 999px;
            min-height: 52px;
            background: var(--brand-dark);
            color: #ffffff;
            font-weight: 700;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #2a2a2a;
            color: #ffffff;
        }

        .alternate-link {
            margin-top: 22px;
            text-align: center;
            color: var(--brand-gray);
        }

        .alternate-link a {
            color: var(--brand-dark);
            text-decoration: none;
            font-weight: 700;
        }

        .alert {
            border-radius: 14px;
            border: none;
        }
    </style>
</head>

<body>
    <div class="auth-wrap">
        <a href="{{ url_for('home') }}" class="back-link"><i class="fa fa-arrow-left"></i> Back to Store</a>

        <div class="auth-card">
            <a href="{{ url_for('home') }}" class="brand-logo">STYLELESS</a>

            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-copy">Sign in to continue shopping and check your orders.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('do_customer_login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="username" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label" for="remember">Keep me signed in</label>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="alternate-link">
                New here? <a href="{{ url_for('register') }}">Create an account</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
