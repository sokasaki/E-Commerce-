<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - STYLELESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='final_project/image5.png') }}">
    <style>
        :root {
            --brand-dark: #111111;
            --brand-gray: #717171;
            --brand-light: #F5F5F5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: #ffffff;
            font-family: var(--font-main);
            color: var(--brand-dark);
        }

        .contact-container {
            padding-top: 150px;
            padding-bottom: 100px;
        }

        .contact-header {
            font-family: var(--font-heading);
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -2px;
        }

        /* Form Styling */
        .contact-card {
            background: var(--brand-light);
            border-radius: 32px;
            padding: 50px;
            border: none;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-gray);
            margin-bottom: 10px;
        }

        .form-control {
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            padding: 14px 20px;
            font-size: 1rem;
            background-color: white;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--brand-dark);
            box-shadow: none;
        }

        .btn-send {
            background: var(--brand-dark);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 18px;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 20px;
            transition: var(--transition);
        }

        .btn-send:hover {
            background: #333;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Info Styling */
        .info-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-icon {
            width: 54px;
            height: 54px;
            background: var(--brand-light);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: var(--brand-dark);
        }

        .info-label {
            font-weight: 800;
            font-family: var(--font-heading);
            margin-bottom: 2px;
        }

        .info-value {
            color: var(--brand-gray);
            font-size: 0.95rem;
        }

        @media (max-width: 991px) {
            .contact-header { font-size: 2.5rem; }
            .contact-card { padding: 30px; }
            .info-icon {
                width: 44px;
                height: 44px;
                font-size: 1rem;
            }
            .info-label {
                font-size: 0.9rem;
            }
            .info-value {
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    {% include 'front/header.html' %}

    <main class="contact-container">
        <div class="container">
            <div class="row g-5">
                <!-- Info Column -->
                <div class="col-lg-5">
                    <h1 class="contact-header">We're Here<br>to Help.</h1>
                    <p class="text-muted fs-5 mb-5" style="max-width: 400px;">Have a question? Our team is ready to assist you.</p>
                    
                    <div class="row g-4">
                        <div class="col-6 col-lg-12">
                            <div class="info-item">
                                <div class="info-icon"><i class="fa-solid fa-envelope"></i></div>
                                <div>
                                    <div class="info-label">Email Us</div>
                                    <div class="info-value">support@styleless.com</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-6 col-lg-12">
                            <div class="info-item">
                                <div class="info-icon"><i class="fa-solid fa-phone"></i></div>
                                <div>
                                    <div class="info-label">Call Us</div>
                                    <div class="info-value">+1 (234) 567 8900</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="info-item">
                                <div class="info-icon"><i class="fa-solid fa-location-dot"></i></div>
                                <div>
                                    <div class="info-label">Our Studio</div>
                                    <div class="info-value">123 Fashion Ave, New York, NY</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 mt-lg-5 pt-2">
                        <h6 class="fw-bold text-uppercase letter-spacing-1 mb-3 mb-lg-4" style="font-size: 0.7rem;">Follow Our Journey</h6>
                        <div class="d-flex gap-2">
                            <a href="#" class="btn btn-outline-dark rounded-circle" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;"><i class="fa-brands fa-instagram"></i></a>
                            <a href="#" class="btn btn-outline-dark rounded-circle" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;"><i class="fa-brands fa-facebook-f"></i></a>
                            <a href="#" class="btn btn-outline-dark rounded-circle" style="width:40px; height:40px; display:flex; align-items:center; justify-content:center;"><i class="fa-brands fa-tiktok"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Form Column -->
                <div class="col-lg-7">
                    <div class="contact-card">
                        <h3 class="fw-bold mb-4" style="font-family: var(--font-heading);">Send a Message</h3>
                        <form action="contact/submit" method="POST">
                            <div class="mb-4">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" name="name" placeholder="E.g. Jane Doe" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" name="email" placeholder="jane@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">How can we help?</label>
                                <textarea class="form-control" name="message" rows="6" placeholder="Tell us more about your inquiry..." required></textarea>
                            </div>
                            <button type="submit" class="btn-send">Send Inquiry</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    {% include 'front/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
