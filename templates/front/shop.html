<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Collection - STYLELESS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='final_project/image5.png') }}">
    <style>
        :root {
            --brand-dark: #111111;
            --brand-gray: #717171;
            --brand-light: #F5F5F5;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-heading: 'Outfit', sans-serif;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: #ffffff;
            font-family: var(--font-main);
            color: var(--brand-dark);
        }

        .shop-container {
            padding-top: 120px;
            padding-bottom: 80px;
        }

        .breadcrumb-custom {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--brand-gray);
            margin-bottom: 30px;
        }

        .breadcrumb-custom a {
            color: var(--brand-gray);
            text-decoration: none;
            transition: var(--transition);
        }

        .breadcrumb-custom a:hover {
            color: var(--brand-dark);
        }

        /* Sidebar Styling */
        .filter-sidebar {
            background: var(--brand-light);
            border-radius: 24px;
            padding: 30px;
            position: sticky;
            top: 120px;
        }

        .filter-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand-gray);
            margin-bottom: 10px;
        }

        .form-control, .form-select {
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 0.95rem;
            background-color: white;
            transition: var(--transition);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--brand-dark);
            box-shadow: none;
        }

        .btn-filter-apply {
            background: var(--brand-dark);
            color: white;
            border-radius: 12px;
            font-weight: 700;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 20px;
            transition: var(--transition);
        }

        .btn-filter-apply:hover {
            background: #333;
            transform: translateY(-2px);
        }

        /* Product Grid */
        .product-count-header {
            font-family: var(--font-heading);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Reuse Premium Card Styles */
        .premium-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            background: var(--brand-light);
            transition: var(--transition);
            margin-bottom: 30px;
            height: calc(100% - 30px);
        }

        .premium-card:hover {
            background: white;
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .card-img-box {
            aspect-ratio: 1/1.2;
            overflow: hidden;
            position: relative;
        }

        .card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .premium-card:hover .card-img-box img {
            transform: scale(1.05);
        }

        .premium-card-body {
            padding: 20px;
        }

        .card-product-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 5px;
            color: var(--brand-dark);
            text-decoration: none;
            display: block;
        }

        .card-product-price {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--brand-dark);
        }

        .btn-add-mini {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--brand-dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: var(--transition);
        }

        .btn-add-mini:hover {
            background: #333;
            transform: scale(1.1);
        }

        /* Responsive Fixes for Phone */
        @media (max-width: 768px) {
            .shop-container {
                padding-top: 100px;
            }
            .product-count-header {
                font-size: 1.5rem;
            }
            .premium-card-body {
                padding: 15px;
            }
            .card-product-title {
                font-size: 0.9rem;
            }
            .card-product-price {
                font-size: 1rem;
            }
            .filter-sidebar {
                margin-bottom: 30px;
                position: relative;
                top: 0;
            }
            .filter-toggle-btn {
                background: var(--brand-light);
                color: var(--brand-dark);
                border: none;
                border-radius: 16px;
                padding: 16px 20px;
                font-weight: 700;
                font-size: 1rem;
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 100%;
                margin-bottom: 15px;
            }
            .filter-toggle-btn[aria-expanded="true"] .toggle-icon {
                transform: rotate(180deg);
            }
            .toggle-icon {
                transition: transform 0.3s ease;
            }
        }
    </style>
</head>

<body>
    {% include 'front/header.html' %}

    <main class="shop-container">
        <div class="container">
            <!-- Breadcrumbs -->
            <div class="breadcrumb-custom">
                <a href="{{ url_for('home') }}">Home</a>
                <i class="fa fa-chevron-right" style="font-size: 0.6rem;"></i>
                <span>Shop</span>
            </div>

            <div class="row g-4">
                <!-- Mobile Filter Toggle -->
                <div class="col-12 d-lg-none">
                    <button class="filter-toggle-btn" type="button" data-bs-toggle="collapse" data-bs-target="#filterSidebarCollapse" aria-expanded="false" aria-controls="filterSidebarCollapse">
                        <span><i class="fa-solid fa-sliders me-2"></i> Filters & Sort</span>
                        <i class="fa-solid fa-chevron-down toggle-icon"></i>
                    </button>
                </div>

                <!-- Sidebar Filters -->
                <div class="col-lg-3">
                    <aside class="filter-sidebar collapse d-lg-block" id="filterSidebarCollapse">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="filter-title mb-0">Filters</h2>
                            <button type="button" class="btn-close d-lg-none" data-bs-toggle="collapse" data-bs-target="#filterSidebarCollapse" aria-label="Close"></button>
                        </div>
                        
                        <!-- Search -->
                        <div class="mb-4">
                            <label class="form-label">Search</label>
                            <div class="position-relative">
                                <input type="text" class="form-control pe-5" id="searchInput" placeholder="Looking for...">
                                <i class="fa fa-search position-absolute end-0 top-50 translate-middle-y me-3 text-muted"></i>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="mb-4">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="categoryFilter">
                                <option value="all">All Items</option>
                                {% for category in categories %}
                                <option value="{{ category.name }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <!-- Sort -->
                        <div class="mb-4">
                            <label class="form-label">Sort By</label>
                            <select class="form-select" id="sortFilter">
                                <option value="default">Newest First</option>
                                <option value="price-asc">Price: Low to High</option>
                                <option value="price-desc">Price: High to Low</option>
                                <option value="name-asc">Name: A to Z</option>
                            </select>
                        </div>

                        <button class="btn-filter-apply" onclick="applyFilters()">Apply Filters</button>
                        <button class="btn btn-link w-100 text-muted small mt-2 text-decoration-none" onclick="clearFilters()">Reset All</button>
                    </aside>
                </div>

                <!-- Products Display -->
                <div class="col-lg-9">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="product-count-header mb-0" id="resultsCount">The Collection</h1>
                        <div id="loadingSpinner" class="spinner-border spinner-border-sm text-dark d-none"></div>
                    </div>

                    <div class="row g-3 g-md-4" id="productsContainer">
                        {% for product in products %}
                        <div class="col-lg-4 col-md-6 col-6">
                            <div class="premium-card">
                                <div class="card-img-box">
                                    <a href="{{ url_for('detail', id=product.id) }}">
                                        <img src="{{ product.image or product.image_url or url_for('static', filename='final_project/banner-1.jpg') }}" alt="{{ product.name }}">
                                    </a>
                                </div>
                                <div class="premium-card-body">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <div>
                                            <a href="{{ url_for('detail', id=product.id) }}" class="card-product-title">{{ product.name }}</a>
                                            <div class="card-product-price">${{ '%.2f'|format(product.price) }}</div>
                                        </div>
                                        <button class="btn-add-mini" onclick='addCartHome({{ product | tojson | safe }})'>
                                            <i class="fa fa-shopping-bag"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    </div>
                    
                    <div id="showMoreContainer" class="text-center mt-5"></div>
                </div>
            </div>
        </div>
    </main>

    {% include 'front/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const shopProducts = {{ products | tojson | safe }};
    </script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
