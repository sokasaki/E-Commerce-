<!-- Vue 3 CDN -->
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

<!-- Notification Container -->
<div id="notification-app">
    <transition-group name="toast" tag="div" class="toast-container">
        <div v-for="toast in toasts" :key="toast.id" 
             :class="['toast-notification', 'toast-' + toast.type]"
             @click="removeToast(toast.id)">
            <div class="toast-icon">
                <i :class="getIcon(toast.type)"></i>
            </div>
            <div class="toast-content">
                <div class="toast-title">[[ toast.title ]]</div>
                <div class="toast-message">[[ toast.message ]]</div>
            </div>
            <button class="toast-close" @click.stop="removeToast(toast.id)">
                <i class="fa fa-times"></i>
            </button>
            <div class="toast-progress" :style="{ animationDuration: toast.duration + 'ms' }"></div>
        </div>
    </transition-group>
</div>

<style>
    .toast-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 380px;
        width: 100%;
        pointer-events: none;
    }

    .toast-notification {
        pointer-events: all;
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 18px;
        border-radius: 14px;
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,0.2);
    }

    .toast-success {
        background: linear-gradient(135deg, rgba(16,185,129,0.95), rgba(5,150,105,0.95));
        color: #fff;
    }

    .toast-danger, .toast-error {
        background: linear-gradient(135deg, rgba(239,68,68,0.95), rgba(220,38,38,0.95));
        color: #fff;
    }

    .toast-warning {
        background: linear-gradient(135deg, rgba(245,158,11,0.95), rgba(217,119,6,0.95));
        color: #fff;
    }

    .toast-info {
        background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
        color: #fff;
    }

    .toast-order {
        background: linear-gradient(135deg, rgba(139,92,246,0.95), rgba(124,58,237,0.95));
        color: #fff;
    }

    .toast-icon {
        font-size: 1.3rem;
        flex-shrink: 0;
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
    }

    .toast-content {
        flex: 1;
        min-width: 0;
    }

    .toast-title {
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 2px;
        letter-spacing: 0.3px;
    }

    .toast-message {
        font-size: 0.82rem;
        opacity: 0.9;
        line-height: 1.4;
    }

    .toast-close {
        background: none;
        border: none;
        color: rgba(255,255,255,0.7);
        cursor: pointer;
        padding: 4px;
        font-size: 0.85rem;
        transition: color 0.2s;
        flex-shrink: 0;
    }

    .toast-close:hover {
        color: #fff;
    }

    .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: rgba(255,255,255,0.4);
        border-radius: 0 0 14px 14px;
        animation: toast-countdown linear forwards;
        width: 100%;
    }

    @keyframes toast-countdown {
        from { width: 100%; }
        to { width: 0%; }
    }

    /* Transition animations */
    .toast-enter-active {
        animation: toast-slide-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .toast-leave-active {
        animation: toast-slide-out 0.3s ease-in forwards;
    }

    @keyframes toast-slide-in {
        from {
            opacity: 0;
            transform: translateX(100px) scale(0.8);
        }
        to {
            opacity: 1;
            transform: translateX(0) scale(1);
        }
    }

    @keyframes toast-slide-out {
        from {
            opacity: 1;
            transform: translateX(0) scale(1);
            max-height: 200px;
        }
        to {
            opacity: 0;
            transform: translateX(100px) scale(0.8);
            max-height: 0;
            padding: 0;
            margin: 0;
        }
    }

    @media (max-width: 480px) {
        .toast-container {
            right: 10px;
            left: 10px;
            max-width: none;
        }
    }
</style>

<script>
    const NotificationApp = Vue.createApp({
        delimiters: ['[[', ']]'],
        data() {
            return {
                toasts: [],
                nextId: 0,
                eventSource: null
            }
        },
        methods: {
            addToast(title, message, type = 'info', duration = 4000) {
                const id = this.nextId++;
                this.toasts.push({ id, title, message, type, duration });
                setTimeout(() => this.removeToast(id), duration);
            },
            removeToast(id) {
                const index = this.toasts.findIndex(t => t.id === id);
                if (index > -1) this.toasts.splice(index, 1);
            },
            getIcon(type) {
                const icons = {
                    success: 'fa fa-check-circle',
                    danger: 'fa fa-exclamation-circle',
                    error: 'fa fa-exclamation-circle',
                    warning: 'fa fa-exclamation-triangle',
                    info: 'fa fa-info-circle',
                    order: 'fa fa-shopping-bag'
                };
                return icons[type] || icons.info;
            },
            connectSSE() {
                // Only connect if user is logged in
                this.eventSource = new EventSource('/notifications/stream');
                
                this.eventSource.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        this.addToast(data.title, data.message, data.type || 'info', data.duration || 5000);
                    } catch(e) {
                        console.error('SSE parse error:', e);
                    }
                };

                this.eventSource.onerror = () => {
                    // Reconnect after 5 seconds
                    this.eventSource.close();
                    setTimeout(() => this.connectSSE(), 5000);
                };
            }
        },
        mounted() {
            // Expose global notify function
            window.notify = (title, message, type, duration) => {
                this.addToast(title, message, type, duration);
            };

            // Show any Flask flash messages as toasts
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        this.addToast(
                            '{{ category | capitalize }}',
                            '{{ message }}',
                            '{{ category }}'
                        );
                    {% endfor %}
                {% endif %}
            {% endwith %}

            // Connect SSE for real-time notifications (if logged in)
            {% if session.get('user_id') %}
                this.connectSSE();
            {% endif %}
        },
        beforeUnmount() {
            if (this.eventSource) {
                this.eventSource.close();
            }
        }
    });

    NotificationApp.mount('#notification-app');
</script>
