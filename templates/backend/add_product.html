<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product | STYLELESS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>

<body>
    <div class="d-flex" id="wrapper">
        {% include 'backend/sidebar.html' %}
        <!-- Page Content -->
        <div id="page-content-wrapper">
            <div class="container-fluid" id="main-content">
                <!-- Dashboard Header -->
                <div class="dashboard-header-row">
                    <button class="mobile-toggle" id="menu-toggle" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2>Add New Product</h2>
                    <div class="user-info">
                        <span class="d-none d-md-inline">Welcome, Admin!</span>
                        <div class="dropdown">
                            <a class="dropdown-toggle" href="#" id="dropdownMenuLink" role="button"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <i class="fas fa-user-circle"></i>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownMenuLink">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-user-alt me-2"></i>Profile</a>
                                </li>
                                <li><a class="dropdown-item" href="#"><i class="fas fa-cog me-2"></i>Settings</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Add Product Form -->
                <div class="card">
                    <div class="card-header">
                        <span><i class="fas fa-plus me-2"></i>Product Details</span>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="{{ url_for('add_product') }} " enctype="multipart/form-data">
                            <div class="row mb-3 text-center">
                                <div class="col-md-12">
                                    <label class="form-label">Product Images</label>
                                    <div class="image-preview-container d-flex flex-wrap gap-2 mb-3 justify-content-center"
                                        id="imagePreviewContainer">
                                        <!-- Image previews will appear here -->
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Product Name <span
                                            class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="sku" class="form-label">SKU <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="sku" name="sku" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="price" class="form-label">Price <span
                                            class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="price" name="price" step="any"
                                        required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="stock" class="form-label">Stock <span
                                            class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="stock" name="stock" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="category_id" class="form-label">Category <span
                                            class="text-danger">*</span></label>
                                    <select class="form-select" id="category_id" name="category_id" required>
                                        <option value="">Select Category</option>
                                        {% for category in categories %}
                                        <option value="{{ category.id }}">{{ category.name }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="status" class="form-label">Status</label>
                                    <select class="form-select" id="status" name="status">
                                        <option value="active">Active</option>
                                        <option value="inactive">Inactive</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                            </div>

                            <div class="mb-3 ">

                                <div class="row mb-3">
                                    <div class="col-md-12">
                                        <div id="dropZone" class="dropzone-area mb-2"
                                            onclick="document.getElementById('images').click();"
                                            ondragover="event.preventDefault(); this.classList.add('dragover');"
                                            ondragleave="this.classList.remove('dragover');" ondrop="handleDrop(event)">
                                            <i class="fas fa-cloud-upload-alt fa-2x mb-2"></i>
                                            <span id="dropZoneText">Drag & Drop or Click to Select Images
                                                (Multiple)</span>
                                            <input type="file" id="images" name="images" accept="image/*" multiple
                                                style="display:none;" onchange="previewMultipleImages()">
                                        </div>
                                        <small class="text-muted">You can select multiple images. First image will be
                                            the primary image.</small>
                                    </div>

                                </div>

                            </div>

                            <div class="d-flex gap-2 ">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Product
                                </button>
                                <a href="{{ url_for('products') }}" class="btn btn-secondary">
                                    <i class="fas fa-times me-2"></i>Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    <style>
        .dropzone-area {
            border: 2px dashed #6c757d;
            border-radius: 8px;
            padding: 32px 12px;
            text-align: center;
            color: #6c757d;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .dropzone-area.dragover {
            border-color: #007bff;
            background: #f0f8ff;
        }

        .image-preview-item {
            position: relative;
            width: 150px;
            height: 150px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: #f8f9fa;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item .remove-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(220, 53, 69, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .image-preview-item .primary-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(40, 167, 69, 0.9);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }
    </style>
    <script>
        let selectedFiles = [];

        function previewMultipleImages() {
            const input = document.getElementById('images');
            const container = document.getElementById('imagePreviewContainer');

            if (input.files && input.files.length > 0) {
                selectedFiles = Array.from(input.files);
                updatePreviews();
                document.getElementById('dropZoneText').innerHTML = `${selectedFiles.length} image(s) selected`;
            }
        }

        function updatePreviews() {
            const container = document.getElementById('imagePreviewContainer');
            container.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'image-preview-item';
                    previewItem.innerHTML = `
                        <img src="${e.target.result}" alt="Preview ${index + 1}">
                        ${index === 0 ? '<div class="primary-badge">PRIMARY</div>' : ''}
                        <button type="button" class="remove-btn" onclick="removeImage(${index})" title="Remove">
                            <i class="fas fa-times"></i>
                        </button>
                    `;
                    container.appendChild(previewItem);
                };
                reader.readAsDataURL(file);
            });
        }

        function removeImage(index) {
            selectedFiles.splice(index, 1);

            // Update the file input
            const dt = new DataTransfer();
            selectedFiles.forEach(file => dt.items.add(file));
            document.getElementById('images').files = dt.files;

            updatePreviews();

            if (selectedFiles.length === 0) {
                document.getElementById('dropZoneText').innerHTML = 'Drag & Drop or Click to Select Images (Multiple)';
            } else {
                document.getElementById('dropZoneText').innerHTML = `${selectedFiles.length} image(s) selected`;
            }
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');
            const files = event.dataTransfer.files;
            if (files && files.length > 0) {
                const input = document.getElementById('images');
                input.files = files;
                previewMultipleImages();
            }
        }
    </script>
</body>

</html>
