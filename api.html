<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Flat Product Grid</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --price-color: #059669;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            margin-bottom: 40px;
        }

        /* The Grid Container */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* The Modern Flat Card */
        .product-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #e2e8f0; /* Subtle flat border */
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        .image-container {
            padding: 20px;
            background: #fff;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .category {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.4;
            /* Clamp text to 2 lines */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .description {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--price-color);
        }

        .rating {
            font-size: 0.8rem;
            font-weight: 600;
            background: #fef3c7;
            color: #92400e;
            padding: 2px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="app">
        <h1>Store Collection</h1>

        <div class="product-grid">
            <div v-for="product in product_list" :key="product.id" class="product-card">
                <div class="image-container">
                    <img :src="product.image" :alt="product.title">
                </div>
                
                <div class="content">
                    <span class="category">[[ product.category ]]</span>
                    <h2 class="title">[[ product.title ]]</h2>
                    <p class="description">[[ product.description ]]</p>
                    
                    <div class="footer">
                        <span class="price">$[[ product.price ]]</span>
                        <span class="rating">★ [[ product.rating.rate ]]</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        const { createApp } = Vue
        createApp({
            delimiters: ['[[', ']]'],
            data() {
                return {
                    product_list: []
                }
            },
            mounted() {
                axios.get('https://fakestoreapi.com/products')
                    .then(response => {
                        this.product_list = response.data
                    })
                    .catch(error => console.error(error));
            }
        }).mount('#app')
    </script>
</body>
</html>
