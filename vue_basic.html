<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Vue Todo</title>
    <style>
        :root {
            --primary: #6366f1;
            --danger: #ef4444;
            --success: #22c55e;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        #app {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button.add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #ffffff;
            border-bottom: 1px solid #f1f5f9;
            gap: 12px;
            transition: background 0.2s;
        }

        li:hover {
            background: #fdfdfd;
        }

        .todo-text {
            flex-grow: 1;
            font-size: 1rem;
        }

        .done-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .delete-btn {
            background: none;
            border: 1px solid #fee2e2;
            color: var(--danger);
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
        }

        .debug-box {
            margin-top: 2rem;
            font-size: 0.7rem;
            background: #eee;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div id="app">
    <h1>Todo List</h1>

    <div class="input-group">
        <input
                type="text"
                v-model="title"
                @keyup.enter="add"
                placeholder="What needs to be done?"
                ref="todoInput"
        >
        <button class="add-btn" @click="add">Add</button>
    </div>

    <ul>
        <li v-for="(item, index) in todo_list" :key="item.id">
            <input type="checkbox" v-model="item.is_done">

            <span :class="['todo-text', { 'done-text': item.is_done }]">
                [[ item.title ]]
            </span>

            <button class="delete-btn" @click="delete_todo(index)">Delete</button>
        </li>
    </ul>

    <p v-if="todo_list.length === 0" style="text-align: center; color: #94a3b8;">
        Your list is empty. Add a task above!
    </p>


</div>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script>
    const {createApp} = Vue
    createApp({
        delimiters: ['[[', ']]'],
        data() {
            return {
                title: '',
                todo_list: []
            }
        },
        methods: {
            add() {
                if (this.title.trim() === '') {
                    alert('Please enter a title')
                    return
                }

                this.todo_list.push({
                    // Use Date.now() for a more unique ID than array length
                    id: Date.now(),
                    title: this.title,
                    is_done: false
                })
                this.title = ''
                // Using Vue refs is cleaner than document.querySelector
                this.$refs.todoInput.focus()
            },
            delete_todo(index) {
                if (confirm("Delete this task?")) {
                    this.todo_list.splice(index, 1)
                }
            }
        }
    }).mount('#app')
</script>
</body>
</html>
